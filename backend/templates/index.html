<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Remover</title>
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <div class="container">
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Toggle Theme">☀️</button>
        <div class="left-panel">
            <h1>Background Remover</h1>
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="upload-area" id="uploadArea">
                    <button class="paste-btn" id="pasteBtn" type="button">Paste Image</button>
                    <input type="file" name="files" accept="image/*" id="fileInput" multiple required>
                    <div class="upload-text">Drop your images here or click to browse</div>
                    <div class="upload-subtext">Supports PNG, JPG, JPEG, WebP up to 10MB each</div>
                    <div class="file-count" id="fileCount"></div>
                    <div class="preview" id="preview">
                        <img id="previewImg" alt="Preview">
                    </div>
                </div>
                <div class="submit-container">
                    <button type="submit" id="submitBtn">
                        <span class="btn-icon">✨</span>
                        Magic Remove Background
                    </button>
                </div>
            </form>
        </div>
        <div class="right-panel">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>Processing your image...</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>
            <div class="result" id="result">
                <h3 id="resultTitle">Processed Result</h3>
                <div class="result-container">
                    <img id="resultImg" alt="Processed image" class="result-image">
                </div>
                <div class="result-buttons">
                    <button class="download-btn" id="downloadBtn">
                        <span class="btn-icon">⬇️</span>
                        Download
                    </button>
                    <button id="refineBtn" class="refine-btn">
                        <span class="btn-icon">🖌️</span> Manual Refine
                    </button>
                </div>

                <!-- Manual Refinement Modal -->
                <div id="refineModal" class="modal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2>🖌️ Manual Refinement</h2>
                            <button class="close-modal">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="editor-toolbar">
                                <div class="brush-type">
                                    <button id="brushRestore" class="tool-btn active" title="Restore original image (Smart Mode: Selects similar colors)">
                                        <span class="icon">✨</span> Restore
                                    </button>
                                    <button id="brushRemove" class="tool-btn" title="Remove part of image (Smart Mode: Selects similar colors)">
                                        <span class="icon">🧽</span> Erase
                                    </button>
                                </div>
                                <div class="smart-toggle">
                                    <label class="checkbox-label" title="Automatically select and apply to similar colors when clicking">
                                        <input type="checkbox" id="smartSelection" checked>
                                        🪄 Smart Mode
                                    </label>
                                </div>
                                <div class="wand-controls" id="wandControls">
                                    <label>Tolerance: <span id="toleranceVal">30</span></label>
                                    <input type="range" id="wandTolerance" min="1" max="100" value="30">
                                </div>
                                <div class="brush-size-control" id="brushSizeControl">
                                    <label>Size: <span id="brushSizeVal">20</span>px</label>
                                    <input type="range" id="brushSize" min="5" max="100" value="20">
                                </div>
                                <div class="brush-hardness-control">
                                    <label>Softness: <span id="brushHardnessVal">20</span>%</label>
                                    <input type="range" id="brushHardness" min="0" max="100" value="20">
                                </div>
                                <div class="editor-actions">
                                    <button id="undoRefine" class="tool-btn" title="Undo last action (Ctrl+Z)">↩️ Undo</button>
                                    <button id="saveRefine" class="save-btn">✅ Apply & Save</button>
                                </div>
                            </div>
                            <div class="canvas-container" id="canvasContainer">
                                <canvas id="editorCanvas"></canvas>
                                <canvas id="selectionCanvas"></canvas>
                                <div class="brush-cursor" id="brushCursor"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="options">
                    <div class="option-group">
                        <span class="option-label">Max Size</span>
                        <select id="max_size" name="max_size" class="size-select">
                            <option value="0">Original Size</option>
                            <option value="1920">Full HD (1920px)</option>
                            <option value="1280" selected>Large (1280px)</option>
                            <option value="800">Medium (800px)</option>
                            <option value="500">Small (500px)</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <span class="option-label">Quality</span>
                        <input type="range" id="quality" name="quality" min="10" max="100" value="95">
                    </div>


                    <div class="option-group">
                        <label class="option-label">Background Style:</label>
                        <div class="background-options">
                            <label class="bg-option" title="Transparent Background">
                                <input type="radio" name="background_type" value="transparent" checked>
                                <div class="bg-card">
                                    <span class="bg-icon">🏁</span>
                                    <span class="bg-label">Transparent</span>
                                </div>
                            </label>
                            <label class="bg-option" title="Solid Color Background">
                                <input type="radio" name="background_type" value="color">
                                <div class="bg-card">
                                    <span class="bg-icon">🎨</span>
                                    <span class="bg-label">Solid Color</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="option-group bg-color-group" style="display: none;">
                        <label class="option-label">Select Color:</label>
                        <div class="color-presets">
                            <button type="button" class="color-preset" data-color="#ffffff" style="background: #ffffff;" title="White"></button>
                            <button type="button" class="color-preset" data-color="#000000" style="background: #000000;" title="Black"></button>
                            <button type="button" class="color-preset" data-color="#4299e1" style="background: #4299e1;" title="Blue"></button>
                        </div>
                        <div class="custom-color-input">
                            <input type="color" id="bgColor" name="bg_color" value="#ffffff">
                            <span>Custom Color</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="status" id="status"></div>
        </div>
    </div>
    <script src="../static/script.js"></script>
</body>
</html>
